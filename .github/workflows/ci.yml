name: API Auto Test CI

on:
  push:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 启动 mock_server
        run: |
          nohup python mock_server.py > server.log 2>&1 &

      - name: 等待服务启动
        run: sleep 10

      - name: 查看服务日志
        run: |
          echo "==== server.log ===="
          cat server.log

      - name: 检查服务是否启动
        run: |
          curl http://127.0.0.1:8080/api/login || echo "服务未启动"

      - name: 运行测试
        run: |
          pytest testcases/ --maxfail=1 --disable-warnings